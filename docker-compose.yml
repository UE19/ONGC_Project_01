version: "3.9"

services:

  nginx:
    build: ./nginx
    container_name: vanna_nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      frontend:
        condition: service_healthy
      backend-api:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - vanna_net
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: vanna_frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - vanna_net
    restart: unless-stopped

  backend-api:
    build: ./backend
    container_name: vanna_backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vanna-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - vanna_net
    restart: unless-stopped

  vanna-service:
    build: ./vanna-service
    container_name: vanna_ai_service
    env_file: .env
    volumes:
      - vanna_chroma:/tmp/vanna_chroma
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - vanna_net
    restart: unless-stopped

  worker:
    build: ./worker
    container_name: vanna_worker
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A tasks inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - vanna_net
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: vanna_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vanna_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vanna_redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vanna_net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  vanna_chroma:

networks:
  vanna_net:
    driver: bridge
