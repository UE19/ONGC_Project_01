events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Docker's internal DNS — re-resolve every 10 s so container restarts never break routing
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/m;

    server {
        listen 80;
        server_name _;

        # Allow /chat to be embedded as iframe anywhere; restrict everything else
        add_header X-Frame-Options        "SAMEORIGIN"                   always;
        # Override for /chat below
        add_header X-Content-Type-Options "nosniff"                      always;
        add_header X-XSS-Protection       "1; mode=block"                always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        # Standalone chat app — allow iframe embedding from any origin
        location /chat {
            add_header X-Frame-Options "" always;
            add_header Content-Security-Policy "frame-ancestors *" always;
            set $fe http://frontend:3000;
            proxy_pass $fe;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # Frontend — React SPA
        location / {
            set $fe http://frontend:3000;
            proxy_pass $fe;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # Auth endpoints — stricter rate limit
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;
            set $be http://backend-api:8000;
            proxy_pass $be;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # Main API — standard rate limit
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            set $be http://backend-api:8000;
            proxy_pass $be;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            client_max_body_size 10m;
        }

        # Health check
        location /health {
            set $be http://backend-api:8000;
            proxy_pass $be/health;
        }
    }
}
